---
- name: Create /etc/ssh/sshd_config.d
  ansible.legacy.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    mode: "0o700"
    owner: root
    group: "{{ secure_root_group }}"

- name: Restrict key exhcange
  ansible.legacy.template:
    src: ssh_audit_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/ssh_audit_hardening.conf
    mode: "0o600"
    owner: root
    group: "{{ secure_root_group }}"
  notify: Restart ssh

- name: Ensure we have Include ssh_audit_hardening.conf
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^Include /etc/ssh/sshd_config.d/ssh_audit_hardening.conf'
    line: 'Include /etc/ssh/sshd_config.d/ssh_audit_hardening.conf'
  notify: Restart ssh

- name: Find vulnerable host keys
  ansible.builtin.find:
    paths: /etc/ssh
    file_type: file
    use_regex: true
    patterns:
      - 'ssh_host_dsa*'
      - 'ssh_host_ecdsa*'
      - 'ssh_host_ke*'
  register: ssh_host_keys

- name: Debug
  ansible.builtin.debug:
    var: ssh_host_keys

- name: Remove vulnerable host ssh keys
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ ssh_host_keys.files }}"
